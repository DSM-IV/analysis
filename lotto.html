<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또번호 생성기</title>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1269032424784987" crossorigin="anonymous"></script>
  <link href="style.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <button id="themeToggle" onclick="toggleTheme()" aria-label="테마 전환"></button>
    <h1>로또번호 생성기</h1>
    <p class="subtitle">행운의 번호를 뽑아보세요!</p>

    <div class="controls">
      <label for="setCount">생성 세트 수</label>
      <select id="setCount">
        <option value="1">1세트</option>
        <option value="3">3세트</option>
        <option value="5" selected>5세트</option>
        <option value="10">10세트</option>
      </select>
    </div>

    <button id="generateBtn" onclick="generate()">번호 생성</button>

    <!-- Ad -->
    <div style="text-align:center; margin-bottom: 24px;">
      <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1269032424784987" data-ad-slot="auto" data-ad-format="auto" data-full-width-responsive="true"></ins>
      <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div id="results"></div>

    <div id="history" class="history-section" style="display:none;">
      <h2>생성 기록</h2>
      <button class="clear-btn" onclick="clearHistory()">기록 삭제</button>
      <div id="historyList"></div>
    </div>
  </div>

  <script type="text/javascript" src="main.js"></script>
</body>
</html>
